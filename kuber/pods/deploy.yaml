apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: test-app
  name: test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-app
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: test-app
    spec:
      containers:
      - image: nginx
        name: nginx
        resources: 
          requests:
            memory: "64Mi"
            cpu: "250m" 
          limits:
            memory: "128Mi"
            cpu: "500m"
status: {}
