apiVersion: v1
kind: Pod
metadata:
  
  labels:
    run: test-pod
  name: test-pod
spec:
  containers:
  - image: nginx
    name: test-pod
    resources: 
      requests:
        memory: "64Mi"
        cpu: "250m" 
      limits:   
        memory: "128Mi"
        cpu: "500m"
    env:
    - name: DB_HOST
      valueFrom:
        configMapKeyRef:
          name: bot-config
          key: DB_HOST
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef: 
          name: db-secret
          key: DATABASE_URL

  dnsPolicy: ClusterFirst
  restartPolicy: Always
status: {}