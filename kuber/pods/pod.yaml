apiVersion: v1
kind: Pod
metadata:
  
  labels:
    run: test-pod
  name: test-pod
  
spec:
  containers:
  - image: nginx
    name: test-pod
    resources: 
      requests:
        memory: "64Mi"
        cpu: "250m" 
      limits:
        memory: "128Mi"
        cpu: "500m"

  dnsPolicy: ClusterFirst
  restartPolicy: Always
status: {}