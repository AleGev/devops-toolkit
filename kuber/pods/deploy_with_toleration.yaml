apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app
  labels:
    app: test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-app
  template: 
    metadata:
      labels:
        app: test-app
    spec:   
      tolerations:
        - key: "role"
          operator: "Equal"
          value: "db_nodes"
          effect: "NoSchedule"
      
      nodeSelector:
        role: db_nodes
        
      containers:
      - image: nginx
        name: nginx
        resources: 
          requests:
            memory: "64Mi"
            cpu: "250m" 
          limits:
            memory: "128Mi"
            cpu: "500m"
status: {}
